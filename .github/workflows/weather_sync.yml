name: Daily Wrocław Weather Sync

on:
  schedule:
    # Runs daily at 06:00 UTC (08:00 Warsaw time)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub repository actions UI

jobs:
  run-sync:
    name: Weather Parser Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Run Weather Ingestion Script
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          S3_KEY_PREFIX: ${{ secrets.S3_KEY_PREFIX }}
        run: python lambda_function.py
